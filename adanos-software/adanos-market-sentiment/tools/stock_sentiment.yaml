identity:
  author: adanos-software
  name: stock_sentiment
  label:
    en_US: Get stock sentiment
description:
  human:
    en_US: Get sentiment and attention metrics for one stock from a selected source.
  llm: Get read-only stock sentiment, buzz, trend, and activity metrics from Reddit, X, financial news, or Polymarket.
parameters:
  - name: ticker
    type: string
    required: true
    form: llm
    label:
      en_US: Stock ticker
    human_description:
      en_US: A stock ticker such as AAPL, TSLA, or BRK.A.
    llm_description: Stock ticker symbol without an exchange prefix.
  - name: source
    type: select
    required: true
    default: reddit
    form: form
    label:
      en_US: Source
    human_description:
      en_US: Sentiment data source.
    options:
      - value: reddit
        label:
          en_US: Reddit
      - value: x
        label:
          en_US: X / FinTwit
      - value: news
        label:
          en_US: Financial news
      - value: polymarket
        label:
          en_US: Polymarket
  - name: from_date
    type: string
    required: false
    form: llm
    label:
      en_US: From date
    human_description:
      en_US: Optional inclusive UTC start date in YYYY-MM-DD format.
    llm_description: Optional inclusive UTC start date in YYYY-MM-DD format.
  - name: to_date
    type: string
    required: false
    form: llm
    label:
      en_US: To date
    human_description:
      en_US: Optional inclusive UTC end date in YYYY-MM-DD format.
    llm_description: Optional inclusive UTC end date in YYYY-MM-DD format.
extra:
  python:
    source: tools/stock_sentiment.py
