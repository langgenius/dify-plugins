identity:
  author: adanos-software
  name: market_sentiment
  label:
    en_US: Get market sentiment
description:
  human:
    en_US: Get an aggregate sentiment overview for stocks or crypto.
  llm: Get read-only aggregate market sentiment, activity, and leading drivers for stocks or crypto.
parameters:
  - name: asset_type
    type: select
    required: true
    default: stock
    form: form
    label:
      en_US: Asset type
    human_description:
      en_US: Choose stocks or crypto assets.
    options:
      - value: stock
        label:
          en_US: Stocks
      - value: crypto
        label:
          en_US: Crypto
  - name: source
    type: select
    required: true
    default: reddit
    form: form
    label:
      en_US: Stock source
    human_description:
      en_US: Source used for stocks. Crypto currently uses Reddit.
    options:
      - value: reddit
        label:
          en_US: Reddit
      - value: x
        label:
          en_US: X / FinTwit
      - value: news
        label:
          en_US: Financial news
      - value: polymarket
        label:
          en_US: Polymarket
  - name: from_date
    type: string
    required: false
    form: llm
    label:
      en_US: From date
    human_description:
      en_US: Optional inclusive UTC start date in YYYY-MM-DD format.
    llm_description: Optional inclusive UTC start date in YYYY-MM-DD format.
  - name: to_date
    type: string
    required: false
    form: llm
    label:
      en_US: To date
    human_description:
      en_US: Optional inclusive UTC end date in YYYY-MM-DD format.
    llm_description: Optional inclusive UTC end date in YYYY-MM-DD format.
extra:
  python:
    source: tools/market_sentiment.py
