identity:
  author: adanos-software
  name: crypto_sentiment
  label:
    en_US: Get crypto sentiment
description:
  human:
    en_US: Get Reddit sentiment and attention metrics for one crypto asset.
  llm: Get read-only Reddit crypto sentiment, buzz, trend, and activity metrics for a token symbol.
parameters:
  - name: symbol
    type: string
    required: true
    form: llm
    label:
      en_US: Crypto symbol
    human_description:
      en_US: A crypto symbol such as BTC, ETH, or SOL.
    llm_description: Crypto token symbol without a trading-pair suffix.
  - name: from_date
    type: string
    required: false
    form: llm
    label:
      en_US: From date
    human_description:
      en_US: Optional inclusive UTC start date in YYYY-MM-DD format.
    llm_description: Optional inclusive UTC start date in YYYY-MM-DD format.
  - name: to_date
    type: string
    required: false
    form: llm
    label:
      en_US: To date
    human_description:
      en_US: Optional inclusive UTC end date in YYYY-MM-DD format.
    llm_description: Optional inclusive UTC end date in YYYY-MM-DD format.
extra:
  python:
    source: tools/crypto_sentiment.py
