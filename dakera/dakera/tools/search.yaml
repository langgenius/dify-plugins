identity:
  name: search
  author: dakera
  label:
    en_US: Search Memory
    zh_Hans: 检索记忆
    pt_BR: Pesquisar Memória
description:
  human:
    en_US: >-
      Filtered search / browse over stored memories. Combine an optional text query with tag,
      importance, and result-count filters. Use this to list or audit memories rather than for
      precision recall (use Recall Memory for that).
    zh_Hans: >-
      对已存储记忆进行带过滤条件的检索/浏览。可将可选的文本查询与标签、重要性和数量过滤条件组合使用。
    pt_BR: >-
      Pesquisa/navegação filtrada nas memórias armazenadas. Combine uma consulta de texto opcional
      com filtros de tags, importância e contagem.
  llm: >-
    Search or browse stored memories with filters (tags, minimum importance, result count) and an
    optional text query. Prefer the Recall tool for precise semantic retrieval; use Search to list,
    filter, or audit what an agent remembers.
parameters:
  - name: agent_id
    type: string
    required: false
    default: dify-agent
    label:
      en_US: Agent ID
      zh_Hans: 代理 ID
      pt_BR: ID do Agente
    human_description:
      en_US: Namespace of memories to search. Use the same agent ID as Store/Recall.
      zh_Hans: 要检索的记忆命名空间。使用与存储/召回相同的代理 ID。
      pt_BR: Namespace das memórias a pesquisar. Use o mesmo ID de agente do Armazenar/Recuperar.
    llm_description: Agent namespace to search within.
    form: llm
  - name: query
    type: string
    required: false
    label:
      en_US: Query
      zh_Hans: 查询
      pt_BR: Consulta
    human_description:
      en_US: Optional text query. Leave empty to list memories by filters only.
      zh_Hans: 可选的文本查询。留空则仅按过滤条件列出记忆。
      pt_BR: Consulta de texto opcional. Deixe vazio para listar memórias apenas por filtros.
    llm_description: Optional text query. Omit to browse/filter without semantic matching.
    form: llm
  - name: tags
    type: string
    required: false
    label:
      en_US: Tags
      zh_Hans: 标签
      pt_BR: Tags
    human_description:
      en_US: Comma-separated tags to filter by (memories must have all of them).
      zh_Hans: 用逗号分隔的标签进行过滤（记忆须包含全部标签）。
      pt_BR: Tags separadas por vírgula para filtrar (as memórias devem ter todas).
    llm_description: Optional comma-separated tag filter; results must match all tags.
    form: llm
  - name: min_importance
    type: number
    required: false
    label:
      en_US: Minimum Importance
      zh_Hans: 最小重要性
      pt_BR: Importância Mínima
    human_description:
      en_US: Only return memories with importance at or above this value (0.0–1.0).
      zh_Hans: 仅返回重要性大于等于该值的记忆（0.0–1.0）。
      pt_BR: Retorna apenas memórias com importância igual ou acima deste valor (0.0–1.0).
    llm_description: Optional lower bound on importance, 0.0–1.0.
    form: llm
  - name: top_k
    type: number
    required: false
    default: 10
    label:
      en_US: Top K
      zh_Hans: 数量
      pt_BR: Top K
    human_description:
      en_US: Maximum number of memories to return (1–50). Default 10.
      zh_Hans: 要返回的最大记忆数量（1–50）。默认 10。
      pt_BR: Número máximo de memórias a retornar (1–50). Padrão 10.
    llm_description: Number of memories to return, 1–50. Default 10.
    form: llm
extra:
  python:
    source: tools/search.py
