identity:
  name: get
  author: dakera
  label:
    en_US: Get Memory
    zh_Hans: 获取记忆
    pt_BR: Obter Memória
description:
  human:
    en_US: Fetch a single memory by its ID, including its content, importance, tags, and metadata.
    zh_Hans: 通过 ID 获取单条记忆，包括其内容、重要性、标签和元数据。
    pt_BR: Busca uma única memória pelo seu ID, incluindo conteúdo, importância, tags e metadados.
  llm: >-
    Retrieve one memory by its ID (as returned by Store, Recall, or Search). Use this to inspect
    the full details of a specific memory.
parameters:
  - name: memory_id
    type: string
    required: true
    label:
      en_US: Memory ID
      zh_Hans: 记忆 ID
      pt_BR: ID da Memória
    human_description:
      en_US: The ID of the memory to fetch (e.g. mem_...).
      zh_Hans: 要获取的记忆 ID（例如 mem_...）。
      pt_BR: O ID da memória a buscar (ex. mem_...).
    llm_description: The memory ID to fetch, as returned by Store/Recall/Search (e.g. "mem_abc123").
    form: llm
  - name: agent_id
    type: string
    required: false
    default: dify-agent
    label:
      en_US: Agent ID
      zh_Hans: 代理 ID
      pt_BR: ID do Agente
    human_description:
      en_US: Namespace the memory belongs to. Use the same agent ID it was stored under.
      zh_Hans: 记忆所属的命名空间。使用其存储时的代理 ID。
      pt_BR: Namespace ao qual a memória pertence. Use o mesmo ID de agente do armazenamento.
    llm_description: Agent namespace the memory belongs to.
    form: llm
extra:
  python:
    source: tools/get.py
