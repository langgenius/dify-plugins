identity:
  name: update
  author: dakera
  label:
    en_US: Update Memory
    zh_Hans: 更新记忆
    pt_BR: Atualizar Memória
description:
  human:
    en_US: >-
      Update an existing memory by ID — change its content (re-embedded automatically), importance,
      or tags. Only the fields you provide are changed.
    zh_Hans: >-
      通过 ID 更新已有记忆——修改其内容（自动重新嵌入）、重要性或标签。仅更改您提供的字段。
    pt_BR: >-
      Atualiza uma memória existente pelo ID — altera o conteúdo (reembutido automaticamente),
      a importância ou as tags. Apenas os campos fornecidos são alterados.
  llm: >-
    Update an existing memory by ID. Provide only the fields you want to change: new content
    (which is re-embedded), a new importance (0.0–1.0), and/or replacement tags.
parameters:
  - name: memory_id
    type: string
    required: true
    label:
      en_US: Memory ID
      zh_Hans: 记忆 ID
      pt_BR: ID da Memória
    human_description:
      en_US: The ID of the memory to update (e.g. mem_...).
      zh_Hans: 要更新的记忆 ID（例如 mem_...）。
      pt_BR: O ID da memória a atualizar (ex. mem_...).
    llm_description: The memory ID to update, as returned by Store/Recall/Search.
    form: llm
  - name: agent_id
    type: string
    required: false
    default: dify-agent
    label:
      en_US: Agent ID
      zh_Hans: 代理 ID
      pt_BR: ID do Agente
    human_description:
      en_US: Namespace the memory belongs to. Use the same agent ID it was stored under.
      zh_Hans: 记忆所属的命名空间。使用其存储时的代理 ID。
      pt_BR: Namespace ao qual a memória pertence. Use o mesmo ID de agente do armazenamento.
    llm_description: Agent namespace the memory belongs to.
    form: llm
  - name: content
    type: string
    required: false
    label:
      en_US: New Content
      zh_Hans: 新内容
      pt_BR: Novo Conteúdo
    human_description:
      en_US: Replacement content for the memory. Leave empty to keep the current content.
      zh_Hans: 记忆的替换内容。留空则保留当前内容。
      pt_BR: Conteúdo de substituição para a memória. Deixe vazio para manter o atual.
    llm_description: Optional new content; the memory is re-embedded if this is provided.
    form: llm
  - name: importance
    type: number
    required: false
    label:
      en_US: Importance
      zh_Hans: 重要性
      pt_BR: Importância
    human_description:
      en_US: New importance value, 0.0–1.0. Leave empty to keep the current value.
      zh_Hans: 新的重要性值，0.0–1.0。留空则保留当前值。
      pt_BR: Novo valor de importância, 0.0–1.0. Deixe vazio para manter o atual.
    llm_description: Optional new importance, 0.0–1.0.
    form: llm
  - name: tags
    type: string
    required: false
    label:
      en_US: Tags
      zh_Hans: 标签
      pt_BR: Tags
    human_description:
      en_US: Comma-separated replacement tags. Leave empty to keep the current tags.
      zh_Hans: 用逗号分隔的替换标签。留空则保留当前标签。
      pt_BR: Tags de substituição separadas por vírgula. Deixe vazio para manter as atuais.
    llm_description: Optional comma-separated tags that replace the memory's current tags.
    form: llm
extra:
  python:
    source: tools/update.py
