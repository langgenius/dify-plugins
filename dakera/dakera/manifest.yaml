description:
  en_US: Persistent, decay-weighted memory for AI agents backed by a self-hosted Dakera server. Store facts and semantically recall them across sessions, so agents remember what matters without accumulating stale context.
  zh_Hans: 由自托管 Dakera 服务器支持的 AI 代理持久化衰减权重记忆。存储事实并跨会话语义召回，让代理在不积累过时上下文的情况下记住重要事项。
  pt_BR: Memória persistente e ponderada por decaimento para agentes de IA, com um servidor Dakera auto-hospedado. Armazene fatos e recupere-os semanticamente entre sessões.
