identity:
  author: dakera
  name: dakera
  label:
    en_US: Dakera Memory
    zh_Hans: Dakera 记忆
    pt_BR: Dakera Memory
  description:
    en_US: Persistent, decay-weighted memory for AI agents, backed by a self-hosted Dakera server.
    zh_Hans: 由自托管 Dakera 服务器支持的 AI 代理持久化衰减权重记忆。
    pt_BR: Memória persistente e ponderada por decaimento para agentes de IA, com um servidor Dakera auto-hospedado.
  icon: icon.png
  tags:
    - productivity
    - utilities
credentials_for_provider:
  api_url:
    type: text-input
    required: true
    label:
      en_US: Dakera Server URL
      zh_Hans: Dakera 服务器地址
      pt_BR: URL do Servidor Dakera
    placeholder:
      en_US: http://localhost:3000
      zh_Hans: http://localhost:3000
      pt_BR: http://localhost:3000
    help:
      en_US: >-
        Base URL of your self-hosted Dakera server (default port 3000). Run one with the
        docker-compose in github.com/dakera-ai/dakera-deploy.
      zh_Hans: >-
        自托管 Dakera 服务器的基础地址（默认端口 3000）。可使用 github.com/dakera-ai/dakera-deploy 中的 docker-compose 运行。
      pt_BR: >-
        URL base do seu servidor Dakera auto-hospedado (porta padrão 3000). Execute um com o
        docker-compose em github.com/dakera-ai/dakera-deploy.
    url: https://dakera.ai/docs
  api_key:
    type: secret-input
    required: false
    label:
      en_US: Dakera API Key
      zh_Hans: Dakera API 密钥
      pt_BR: Chave de API Dakera
    placeholder:
      en_US: dk-...
      zh_Hans: dk-...
      pt_BR: dk-...
    help:
      en_US: >-
        API key for your Dakera server (looks like dk-...). Leave empty for unauthenticated
        local development (server started without DAKERA_API_KEY).
      zh_Hans: >-
        Dakera 服务器的 API 密钥（形如 dk-...）。本地开发未设置认证时可留空。
      pt_BR: >-
        Chave de API do servidor Dakera (formato dk-...). Deixe vazio para desenvolvimento local sem autenticação.
    url: https://dakera.ai/docs
extra:
  python:
    source: provider/dakera.py
tools:
  - tools/store.yaml
  - tools/recall.yaml
  - tools/search.yaml
  - tools/get.yaml
  - tools/update.yaml
  - tools/forget.yaml
