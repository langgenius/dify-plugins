identity:
  name: recall
  author: kronvex
  label:
    en_US: Recall
description:
  human:
    en_US: Semantically search memories for an agent
  llm: Search an agent's memories using semantic similarity. Returns relevant memories ranked by confidence.
parameters:
  - name: agent_id
    type: string
    required: true
    label:
      en_US: Agent ID
    human_description:
      en_US: UUID of the agent (from your Kronvex dashboard)
    llm_description: The agent's UUID
    form: llm
  - name: query
    type: string
    required: true
    label:
      en_US: Query
    human_description:
      en_US: What to search for in the agent's memories
    llm_description: Natural language query to search memories
    form: llm
  - name: top_k
    type: number
    required: false
    label:
      en_US: Top K
    human_description:
      en_US: Maximum number of results to return (default 5)
    default: 5
    form: form
extra:
  python:
    source: tools/recall.py
