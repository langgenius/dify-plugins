identity:
  name: iflow_search
  author: zhengyanglsun
  label:
    en_US: iFlow Search
    zh_Hans: iFlow 搜索
  description:
    en_US: iFlow Search tools — AI-native web search, image search, and web page fetch / extraction. Bring your own iFlow API key.
    zh_Hans: iFlow Search 工具 —— 面向 AI 的网页搜索、图片搜索、网页抓取与正文提取。需要您自己的 iFlow API Key。
  icon: icon.svg
  tags:
    - search
    - productivity
credentials_for_provider:
  iflow_api_key:
    type: secret-input
    required: true
    label:
      en_US: iFlow API Key
      zh_Hans: iFlow API Key
    placeholder:
      en_US: Paste your iFlow API key (starts with sk-...)
      zh_Hans: 粘贴你的 iFlow API Key（以 sk- 开头）
    help:
      en_US: Get an API key from the iFlow console. Each user must provide their own key; this plugin never ships with a default.
      zh_Hans: 在 iFlow 控制台申请 API Key。每位用户需要使用自己的 Key，本插件不附带默认 Key。
    url: https://platform.iflow.cn/
extra:
  python:
    source: provider/iflow_search.py
tools:
  - tools/iflow_web_search.yaml
  - tools/iflow_image_search.yaml
  - tools/iflow_web_fetch.yaml
