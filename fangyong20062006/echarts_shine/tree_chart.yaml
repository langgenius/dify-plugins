identity:
  name: tree_chart
  author: fangyong
  label:
    en_US: Tree Chart
    zh_Hans: 树图
description:
  human:
    en_US: Generate a tree chart with Shine theme, for hierarchical data.
    zh_Hans: 生成树图，使用 Shine 主题，适合层级结构数据展示。
  llm: Generate a tree chart using ECharts Shine theme. For organizational charts, file trees, or hierarchical data.
parameters:
  - name: title
    type: string
    required: true
    label:
      en_US: Chart Title
      zh_Hans: 图表标题
    human_description:
      en_US: The title of the chart.
      zh_Hans: 图表标题。
    llm_description: Chart title.
    form: llm
  - name: tree_data
    type: string
    required: true
    label:
      en_US: Tree Data (JSON)
      zh_Hans: 树形数据（JSON）
    human_description:
      en_US: 'Tree data as nested JSON, e.g. {"name":"Root","children":[{"name":"A","children":[{"name":"A1"}]},{"name":"B"}]}'
      zh_Hans: '树形数据，嵌套JSON格式，例如：{"name":"根节点","children":[{"name":"子节点A","children":[{"name":"叶子A1"}]},{"name":"子节点B"}]}'
    llm_description: 'Tree data as nested JSON. Each node has "name" and optional "children" array.'
    form: llm
  - name: layout
    type: select
    required: false
    label:
      en_US: Layout Direction
      zh_Hans: 布局方向
    human_description:
      en_US: Tree layout direction.
      zh_Hans: 树图布局方向。
    llm_description: "Tree layout direction: 'orthogonal' (default, left-right) or 'radial'."
    form: form
    default: orthogonal
    options:
      - value: orthogonal
        label:
          en_US: Orthogonal (Left-Right)
          zh_Hans: 正交（左右）
      - value: radial
        label:
          en_US: Radial
          zh_Hans: 径向
  - name: width
    type: number
    required: false
    label:
      en_US: Width (px)
      zh_Hans: 宽度（像素）
    human_description:
      en_US: Chart width in pixels, default 900.
      zh_Hans: 图表宽度（像素），默认900。
    llm_description: Chart width in pixels.
    form: form
    default: 900
  - name: height
    type: number
    required: false
    label:
      en_US: Height (px)
      zh_Hans: 高度（像素）
    human_description:
      en_US: Chart height in pixels, default 500.
      zh_Hans: 图表高度（像素），默认500。
    llm_description: Chart height in pixels.
    form: form
    default: 500
extra:
  python:
    source: tree_chart.py
