identity:
  name: graph_chart
  author: fangyong
  label:
    en_US: Graph / Relation Chart
    zh_Hans: 关系图
description:
  human:
    en_US: Generate a graph/relation chart with Shine theme.
    zh_Hans: 生成关系图，使用 Shine 主题。
  llm: Generate a graph/network relation chart using ECharts Shine theme.
parameters:
  - name: title
    type: string
    required: true
    label: {en_US: Chart Title, zh_Hans: 图表标题}
    human_description: {en_US: Chart title., zh_Hans: 图表标题。}
    llm_description: Chart title.
    form: llm
  - name: data
    type: string
    required: true
    label:
      en_US: "Data (JSON)"
      zh_Hans: "数据（JSON）"
    human_description:
      en_US: 'Data as JSON: {"nodes":[{"name":"A","value":10},...],"links":[{"source":"A","target":"B","value":5},...]}'
      zh_Hans: '数据：{"nodes":[{"name":"A","value":10},...],"links":[{"source":"A","target":"B","value":5},...]}'
    llm_description: 'Graph data as JSON with "nodes" (each has "name","value","category" optional) and "links" (each has "source","target","value").'
    form: llm
  - name: width
    type: number
    required: false
    label: {en_US: Width (px), zh_Hans: 宽度}
    human_description: {en_US: Width in pixels., zh_Hans: 宽度像素。}
    llm_description: Chart width in pixels.
    form: form
    default: 900
  - name: height
    type: number
    required: false
    label: {en_US: Height (px), zh_Hans: 高度}
    human_description: {en_US: Height in pixels., zh_Hans: 高度像素。}
    llm_description: Chart height in pixels.
    form: form
    default: 500
extra:
  python:
    source: graph_chart.py
