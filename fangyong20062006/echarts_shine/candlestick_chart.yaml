identity:
  name: candlestick_chart
  author: fangyong
  label:
    en_US: Candlestick (K-line) Chart
    zh_Hans: K线图（蜡烛图）
description:
  human:
    en_US: Generate a candlestick (K-line) chart with Shine theme, for financial data.
    zh_Hans: 生成K线图（蜡烛图），使用 Shine 主题，适合金融数据展示。
  llm: Generate a candlestick K-line chart using ECharts Shine theme. For stock or financial OHLC data.
parameters:
  - name: title
    type: string
    required: true
    label:
      en_US: Chart Title
      zh_Hans: 图表标题
    human_description:
      en_US: The title of the chart.
      zh_Hans: 图表标题。
    llm_description: Chart title.
    form: llm
  - name: dates
    type: string
    required: true
    label:
      en_US: Dates (JSON array)
      zh_Hans: 日期（JSON数组）
    human_description:
      en_US: 'Dates as JSON array, e.g. ["2024-01-01","2024-01-02","2024-01-03"]'
      zh_Hans: '日期，JSON数组，例如：["2024-01-01","2024-01-02","2024-01-03"]'
    llm_description: Date labels as JSON array.
    form: llm
  - name: ohlc_data
    type: string
    required: true
    label:
      en_US: OHLC Data (JSON array)
      zh_Hans: OHLC数据（JSON数组）
    human_description:
      en_US: 'OHLC data as JSON array of [open, close, low, high], e.g. [[20,34,10,38],[40,35,30,50]]'
      zh_Hans: 'OHLC数据，格式为[开盘,收盘,最低,最高]，例如：[[20,34,10,38],[40,35,30,50]]'
    llm_description: 'OHLC data as JSON array. Each item is [open, close, low, high].'
    form: llm
  - name: width
    type: number
    required: false
    label:
      en_US: Width (px)
      zh_Hans: 宽度（像素）
    human_description:
      en_US: Chart width in pixels, default 900.
      zh_Hans: 图表宽度（像素），默认900。
    llm_description: Chart width in pixels.
    form: form
    default: 900
  - name: height
    type: number
    required: false
    label:
      en_US: Height (px)
      zh_Hans: 高度（像素）
    human_description:
      en_US: Chart height in pixels, default 500.
      zh_Hans: 图表高度（像素），默认500。
    llm_description: Chart height in pixels.
    form: form
    default: 500
extra:
  python:
    source: candlestick_chart.py
