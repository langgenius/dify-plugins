identity:
  name: calendar_chart
  author: fangyong
  label:
    en_US: Calendar Chart
    zh_Hans: 日历坐标系
description:
  human:
    en_US: Generate a calendar heatmap chart with Shine theme.
    zh_Hans: 生成日历热力图，使用 Shine 主题。
  llm: Generate a calendar chart using ECharts Shine theme. Shows daily data over a year like GitHub contribution graph.
parameters:
  - name: title
    type: string
    required: true
    label: {en_US: Chart Title, zh_Hans: 图表标题}
    human_description: {en_US: Chart title., zh_Hans: 图表标题。}
    llm_description: Chart title.
    form: llm
  - name: data
    type: string
    required: true
    label: {en_US: "Data (JSON)", zh_Hans: "数据（JSON）"}
    human_description:
      en_US: 'Data as JSON: {"year":2024,"data":[["2024-01-01",5],["2024-01-02",10],...]}'
      zh_Hans: '数据：{"year":2024,"data":[["2024-01-01",5],["2024-01-02",10],...]}'
    llm_description: 'Calendar data as JSON with "year" and "data" array of [date_string, value] pairs.'
    form: llm
  - name: width
    type: number
    required: false
    label: {en_US: Width (px), zh_Hans: 宽度}
    human_description: {en_US: Width in pixels., zh_Hans: 宽度像素。}
    llm_description: Chart width in pixels.
    form: form
    default: 900
  - name: height
    type: number
    required: false
    label: {en_US: Height (px), zh_Hans: 高度}
    human_description: {en_US: Height in pixels., zh_Hans: 高度像素。}
    llm_description: Chart height in pixels.
    form: form
    default: 500
extra:
  python:
    source: calendar_chart.py
