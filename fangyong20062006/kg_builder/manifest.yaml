version: 0.0.2
type: plugin
author: fangyong20062006
name: kg_builder
label:
  en_US: Knowledge Graph Builder
  zh_Hans: 知识图谱构建器（图谱化分块）
description:
  en_US: 'Turn Markdown documents into knowledge-graph-style chunks for Dify knowledge bases: each chunk carries entity and relation annotations to boost multi-hop LLM reasoning and retrieval recall. Includes a validator that checks entity coverage, relation completeness, and trap blocks, and outputs a quality report.'
  zh_Hans: '将 Markdown 文档转换为图谱化分块导入 Dify 知识库：每个分块附带实体-关系标注，提升大模型多跳推理与检索召回。内置校验工具，检查实体覆盖率、关系完整性与陷阱块并输出质量报告。'
icon: icon.svg
tags:
  - utilities
  - productivity
resource:
  memory: 268435456
  permission:
    tool:
      enabled: true
    model:
      enabled: false
      llm: false
      text_embedding: false
      rerank: false
      tts: false
      speech2text: false
      moderation: false
    node:
      enabled: false
    endpoint:
      enabled: false
    app:
      enabled: false
    storage:
      enabled: false
      size: 1024
plugins:
  tools:
    - kg_builder.yaml
meta:
  version: 0.0.2
  arch:
    - amd64
    - arm64
  runner:
    language: python
    version: "3.12"
    entrypoint: main
  minimum_dify_version: 1.0.0
created_at: 2026-06-15T00:00:00+08:00
privacy: PRIVACY.md
