version: 0.0.2
type: plugin
author: fangyong20062006
name: html_render
label:
  en_US: HTML Preview Renderer
  zh_Hans: HTML 预览渲染器
description:
  en_US: Wraps any HTML string into a self-contained page for preview. Accepts raw HTML (e.g. ECharts output) and returns it as a renderable HTML page.
  zh_Hans: '将任意 HTML 片段包装为自包含、可在 Dify 中直接预览的完整页面，适合接收 ECharts 等插件的 HTML 输出并即时渲染展示。'
icon: icon.svg
tags:
  - design
  - utilities
resource:
  memory: 268435456
  permission:
    tool:
      enabled: true
    model:
      enabled: false
      llm: false
      text_embedding: false
      rerank: false
      tts: false
      speech2text: false
      moderation: false
    node:
      enabled: false
    endpoint:
      enabled: false
    app:
      enabled: false
    storage:
      enabled: false
      size: 1024
plugins:
  tools:
    - html_render.yaml
meta:
  version: 0.0.2
  arch:
    - amd64
    - arm64
  runner:
    language: python
    version: "3.12"
    entrypoint: main
  minimum_dify_version: 1.0.0
created_at: 2025-06-03T00:00:00+08:00
privacy: PRIVACY.md
