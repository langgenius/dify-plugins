version: 0.0.4
type: plugin
author: fangyong20062006
name: http_slim_tool
label:
  en_US: HTTP Big-Data Slimmer for LLM
  zh_Hans: HTTP 大数据精简工具（防 Token 超限）
description:
  en_US: Slim, filter and paginate large HTTP responses before sending to LLM.
  zh_Hans: '对 HTTP 接口返回的大量数据做字段精简、分页拉取与统计摘要，大幅压缩体积、规避大模型 Token 超限。含三个工具：分页拉取（offset/page/cursor 三种模式）、字段精简（只保留指定字段）、智能摘要（分组/计数/TopN 统计）。'
icon: icon.svg
tags:
  - utilities
  - productivity
resource:
  memory: 268435456
  permission:
    tool:
      enabled: true
    model:
      enabled: false
      llm: false
      text_embedding: false
      rerank: false
      tts: false
      speech2text: false
      moderation: false
    node:
      enabled: false
    endpoint:
      enabled: false
    app:
      enabled: false
    storage:
      enabled: false
      size: 1024
plugins:
  tools:
    - http_slim_tool.yaml
meta:
  version: 0.0.4
  arch:
    - amd64
    - arm64
  runner:
    language: python
    version: "3.12"
    entrypoint: main
  minimum_dify_version: 1.0.0
created_at: 2026-06-17T00:00:00+08:00
privacy: PRIVACY.md
