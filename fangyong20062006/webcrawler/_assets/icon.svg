<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#1A1A2E"/>
  <!-- Globe outline -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#2C3E50" stroke-width="2.5"/>
  <!-- Latitude lines -->
  <ellipse cx="32" cy="32" rx="10" ry="18" fill="none" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="14" y1="32" x2="50" y2="32" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="16" y1="22" x2="48" y2="22" stroke="#2C3E50" stroke-width="1"/>
  <line x1="16" y1="42" x2="48" y2="42" stroke="#2C3E50" stroke-width="1"/>
  <!-- Spider dot -->
  <circle cx="32" cy="32" r="3.5" fill="#4A90D9"/>
  <!-- Spider legs -->
  <line x1="32" y1="28" x2="32" y2="14" stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35" y1="29" x2="46" y2="22" stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35" y1="34" x2="46" y2="42" stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="36" x2="32" y2="50" stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29" y1="34" x2="18" y2="42" stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29" y1="29" x2="18" y2="22" stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round"/>
</svg>
